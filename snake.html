<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Snake Deluxe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(circle,#0f2027,#203a43,#2c5364);color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;padding:15px;text-align:center}
h1{font-size:2em;background:linear-gradient(90deg,#6bcb77,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hud{font-size:1em;margin:8px;display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.hud span{color:#6bcb77;font-weight:bold}
canvas{background:#0a1929;border:3px solid #6bcb77;border-radius:10px;display:block;margin:12px auto;box-shadow:0 0 25px rgba(107,203,119,0.4);max-width:95vw;height:auto}
button{background:rgba(107,203,119,0.2);color:#fff;border:1px solid #6bcb77;padding:6px 14px;border-radius:6px;cursor:pointer;margin:3px;font-size:0.85em}
a{color:#4facfe;display:block;margin-top:12px;text-decoration:none}
.hint{opacity:0.7;margin-top:8px;font-size:0.85em}
</style></head><body>
<h1>🐍 SNAKE DELUXE</h1>
<div class="hud">SCORE <span id="score">0</span> · BEST <span id="best">0</span> · COMBO <span id="combo">x1</span> · LENGTH <span id="len">3</span></div>
<div><button id="wallBtn" onclick="toggleWalls()">Walls: OFF (portals)</button></div>
<canvas id="c" width="440" height="440"></canvas>
<p class="hint">Arrows / WASD · 🍎 = +1 · ⭐ = +5 · Eat fast for combo</p>
<a href="index.html">← Back to menu</a>
<script>
const c=document.getElementById("c"),x=c.getContext("2d"),S=22,N=20;
let best=parseInt(localStorage.getItem("snakeBest")||"0");
document.getElementById("best").textContent=best;
let snake,dir,nextDir,food,golden,goldenTimer,score,over,walls=false,combo=1,lastFoodTime,particles,shake,started;
function reset(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:0,y:0};nextDir={x:0,y:0};
  score=0;over=false;combo=1;lastFoodTime=Date.now();
  particles=[];shake=0;started=false;
  placeFood();golden=null;goldenTimer=0;
}
function placeFood(){while(true){const f={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)};if(!snake.some(s=>s.x===f.x&&s.y===f.y)){food=f;return;}}}
function placeGolden(){if(golden)return;let attempts=0;while(attempts<30){const g={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)};if(!snake.some(s=>s.x===g.x&&s.y===g.y)&&!(food.x===g.x&&food.y===g.y)){golden=g;goldenTimer=100;return;}attempts++;}}
function toggleWalls(){walls=!walls;document.getElementById("wallBtn").textContent="Walls: "+(walls?"ON":"OFF (portals)");}
function spawnParticle(px,py,col,n=12){for(let i=0;i<n;i++)particles.push({x:px*S+S/2,y:py*S+S/2,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:25,col});}
reset();
document.addEventListener("keydown",e=>{
  const k=e.key;
  if(over&&k===" "){reset();return;}
  let newDir=null;
  if(k==="ArrowUp"||k==="w"||k==="W")newDir={x:0,y:-1};
  if(k==="ArrowDown"||k==="s"||k==="S")newDir={x:0,y:1};
  if(k==="ArrowLeft"||k==="a"||k==="A")newDir={x:-1,y:0};
  if(k==="ArrowRight"||k==="d"||k==="D")newDir={x:1,y:0};
  if(newDir){
    e.preventDefault();
    if(!started){started=true;dir=newDir;nextDir=newDir;return;}
    if(newDir.x!==-dir.x||newDir.y!==-dir.y){if(newDir.x!==dir.x||newDir.y!==dir.y)nextDir=newDir;}
  }
});
function tick(){
  if(over||!started)return;
  dir=nextDir;
  let h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(walls){if(h.x<0||h.x>=N||h.y<0||h.y>=N){die();return;}}
  else{h.x=(h.x+N)%N;h.y=(h.y+N)%N;}
  if(snake.some(s=>s.x===h.x&&s.y===h.y)){die();return;}
  snake.unshift(h);
  let ate=false;
  if(h.x===food.x&&h.y===food.y){
    const now=Date.now();
    if(now-lastFoodTime<3000)combo=Math.min(combo+1,8);else combo=1;
    lastFoodTime=now;
    score+=1*combo;
    spawnParticle(food.x,food.y,"#f5576c");
    shake=5;
    placeFood();
    if(Math.random()<0.15&&!golden)placeGolden();
    ate=true;
  }
  if(golden&&h.x===golden.x&&h.y===golden.y){
    score+=5*combo;spawnParticle(golden.x,golden.y,"#ffd93d",25);shake=10;golden=null;goldenTimer=0;
    for(let i=0;i<2;i++)snake.push({...snake[snake.length-1]});
    ate=true;
  }
  if(!ate)snake.pop();
  if(golden){goldenTimer--;if(goldenTimer<=0)golden=null;}
}
function die(){over=true;if(score>best){best=score;localStorage.setItem("snakeBest",best);document.getElementById("best").textContent=best;}spawnParticle(snake[0].x,snake[0].y,"#ff1744",30);shake=15;}
function draw(){
  const sx=shake?(Math.random()-0.5)*shake:0;
  const sy=shake?(Math.random()-0.5)*shake:0;
  x.save();x.translate(sx,sy);
  x.fillStyle="#0a1929";x.fillRect(0,0,440,440);
  x.strokeStyle="rgba(107,203,119,0.08)";
  for(let i=0;i<=N;i++){x.beginPath();x.moveTo(i*S,0);x.lineTo(i*S,440);x.stroke();x.beginPath();x.moveTo(0,i*S);x.lineTo(440,i*S);x.stroke();}
  const pulse=Math.sin(Date.now()/150)*0.15+0.85;
  x.fillStyle=`rgba(245,87,108,${pulse})`;x.beginPath();x.arc(food.x*S+S/2,food.y*S+S/2,S/2-3,0,Math.PI*2);x.fill();
  x.fillStyle="#2d5016";x.fillRect(food.x*S+S/2-1,food.y*S+2,2,4);
  if(golden){const gp=Math.sin(Date.now()/80)*0.3+0.7;x.fillStyle=`rgba(255,217,61,${gp})`;x.shadowColor="#ffd93d";x.shadowBlur=15;x.beginPath();x.arc(golden.x*S+S/2,golden.y*S+S/2,S/2-2,0,Math.PI*2);x.fill();x.shadowBlur=0;x.fillStyle="#fff";x.font="bold 13px sans-serif";x.textAlign="center";x.fillText("★",golden.x*S+S/2,golden.y*S+S/2+5);if(goldenTimer<30&&goldenTimer%6<3){x.strokeStyle="#ffd93d";x.lineWidth=2;x.strokeRect(golden.x*S,golden.y*S,S,S);}}
  snake.forEach((s,i)=>{
    const t=i/snake.length;
    const r=Math.floor(107-t*40),g=Math.floor(203-t*30),b=Math.floor(119-t*20);
    x.fillStyle=`rgb(${r},${g},${b})`;x.fillRect(s.x*S+1,s.y*S+1,S-2,S-2);
    if(i===0){
      x.fillStyle="#fff";const ex=dir.x,ey=dir.y;
      x.fillRect(s.x*S+7+ex*3,s.y*S+5+ey*3,4,4);
      x.fillRect(s.x*S+13+ex*3,s.y*S+5+ey*3,4,4);
      x.fillStyle="#000";
      x.fillRect(s.x*S+8+ex*4,s.y*S+6+ey*4,2,2);
      x.fillRect(s.x*S+14+ex*4,s.y*S+6+ey*4,2,2);
    }
  });
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;x.globalAlpha=p.life/25;x.fillStyle=p.col;x.fillRect(p.x,p.y,4,4);x.globalAlpha=1;});
  particles=particles.filter(p=>p.life>0);
  x.restore();
  if(shake>0)shake--;
  if(!started&&!over){
    x.fillStyle="rgba(0,0,0,0.6)";x.fillRect(0,0,440,440);
    x.fillStyle="#6bcb77";x.font="bold 26px sans-serif";x.textAlign="center";
    x.fillText("PRESS ANY ARROW",220,210);
    x.fillText("TO START",220,245);
    x.fillStyle="#fff";x.font="14px sans-serif";
    x.fillText("(or WASD)",220,275);
  }
  if(over){
    x.fillStyle="rgba(0,0,0,0.75)";x.fillRect(0,0,440,440);
    x.fillStyle="#f5576c";x.font="bold 30px sans-serif";x.textAlign="center";x.fillText("GAME OVER",220,200);
    x.fillStyle="#fff";x.font="16px sans-serif";x.fillText("Score: "+score,220,235);x.fillText("Press SPACE to retry",220,265);
  }
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent="x"+combo;
  document.getElementById("len").textContent=snake.length;
}
let acc=0,last=performance.now();
function loop(now){
  const dt=now-last;last=now;acc+=dt;
  const speed=Math.max(70,140-snake.length*2);
  while(acc>=speed){tick();acc-=speed;}
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>
