<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Snake</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;text-align:center;margin:0;padding:20px}
canvas{background:#000;border:2px solid #6bcb77;display:block;margin:20px auto}
a{color:#4facfe}
</style></head><body>
<h1>🐍 Snake</h1>
<div>Score: <span id="score">0</span></div>
<canvas id="c" width="400" height="400"></canvas>
<p>Arrow keys to move</p>
<p><a href="index.html">← Back to menu</a></p>
<script>
const c=document.getElementById("c"),x=c.getContext("2d"),S=20;
let snake=[{x:200,y:200}],dir={x:S,y:0},food={x:100,y:100},score=0,over=false;
function place(){food={x:Math.floor(Math.random()*20)*S,y:Math.floor(Math.random()*20)*S};}
function reset(){snake=[{x:200,y:200}];dir={x:S,y:0};score=0;over=false;place();}
document.addEventListener("keydown",e=>{
  if(over&&e.key===" ")reset();
  if(e.key==="ArrowUp"&&dir.y===0)dir={x:0,y:-S};
  if(e.key==="ArrowDown"&&dir.y===0)dir={x:0,y:S};
  if(e.key==="ArrowLeft"&&dir.x===0)dir={x:-S,y:0};
  if(e.key==="ArrowRight"&&dir.x===0)dir={x:S,y:0};
});
function tick(){
  if(over)return;
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=400||h.y<0||h.y>=400||snake.some(s=>s.x===h.x&&s.y===h.y)){over=true;return;}
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){score++;place();}else snake.pop();
}
function draw(){
  x.fillStyle="#000";x.fillRect(0,0,400,400);
  x.fillStyle="#f5576c";x.fillRect(food.x,food.y,S-2,S-2);
  x.fillStyle="#6bcb77";snake.forEach(s=>x.fillRect(s.x,s.y,S-2,S-2));
  if(over){x.fillStyle="#fff";x.font="28px sans-serif";x.fillText("Game Over",130,200);x.font="16px sans-serif";x.fillText("Press SPACE to restart",120,230);}
  document.getElementById("score").textContent=score;
}
setInterval(()=>{tick();draw();},120);
</script></body></html>
