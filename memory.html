<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Memory Match</title>
<style>
body{background:#0f0c29;color:#fff;font-family:sans-serif;text-align:center;margin:0;padding:20px}
.grid{display:grid;grid-template-columns:repeat(4,80px);gap:10px;justify-content:center;margin:20px auto}
.card{width:80px;height:80px;background:#4facfe;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;user-select:none}
.card.flipped{background:#fff;color:#000}
.card.matched{background:#6bcb77;cursor:default}
a{color:#4facfe}
button{padding:8px 16px;border:none;border-radius:6px;background:#f5576c;color:#fff;cursor:pointer;margin:10px}
</style></head><body>
<h1>🧠 Memory Match</h1>
<div>Moves: <span id="moves">0</span> | Matched: <span id="matched">0</span>/8</div>
<div class="grid" id="grid"></div>
<button onclick="init()">New Game</button>
<p><a href="index.html">← Back to menu</a></p>
<script>
const symbols=["🍎","🚀","🎲","🎸","⚡","🌟","🎈","🔥"];
let deck=[],flipped=[],matched=0,moves=0,lock=false;
function init(){
  deck=[...symbols,...symbols].sort(()=>Math.random()-0.5);
  flipped=[];matched=0;moves=0;lock=false;
  const g=document.getElementById("grid");g.innerHTML="";
  deck.forEach((sym,i)=>{
    const d=document.createElement("div");
    d.className="card";d.dataset.i=i;d.dataset.sym=sym;
    d.onclick=()=>flip(d);
    g.appendChild(d);
  });
  update();
}
function flip(card){
  if(lock||card.classList.contains("flipped")||card.classList.contains("matched"))return;
  card.classList.add("flipped");card.textContent=card.dataset.sym;
  flipped.push(card);
  if(flipped.length===2){
    moves++;update();
    if(flipped[0].dataset.sym===flipped[1].dataset.sym){
      flipped.forEach(c=>c.classList.add("matched"));flipped=[];matched++;
      update();
      if(matched===8)setTimeout(()=>alert("You won in "+moves+" moves!"),300);
    }else{
      lock=true;
      setTimeout(()=>{
        flipped.forEach(c=>{c.classList.remove("flipped");c.textContent="";});
        flipped=[];lock=false;
      },800);
    }
  }
}
function update(){
  document.getElementById("moves").textContent=moves;
  document.getElementById("matched").textContent=matched;
}
init();
</script></body></html>
