<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Pixel Athlete</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#fff;font-family:sans-serif;min-height:100vh;padding:15px;text-align:center}
h1{font-size:1.8em;color:#ffd93d;text-shadow:2px 2px 0 #f5576c;margin-bottom:10px;letter-spacing:2px}
.hud{font-size:1em;margin:8px;letter-spacing:1px}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;border:3px solid #ffd93d;display:block;margin:10px auto;box-shadow:0 0 20px rgba(255,217,61,0.3);max-width:95vw;height:auto}
a{color:#4facfe;display:block;margin-top:12px;text-decoration:none}
.hint{opacity:0.7;margin-top:8px;font-size:0.85em}
</style></head><body>
<h1>🏃 PIXEL ATHLETE</h1>
<div class="hud">SCORE <span id="score">0</span> · BEST <span id="best">0</span></div>
<canvas id="c" width="700" height="280"></canvas>
<p class="hint">SPACE or ↑ jump (double-tap = double jump) · ↓ duck</p>
<a href="index.html">← Back to menu</a>
<script>
const c=document.getElementById("c"),x=c.getContext("2d");
x.imageSmoothingEnabled=false;
const W=700,H=280,GROUND=200;
let best=parseInt(localStorage.getItem("jumperBest")||"0");
document.getElementById("best").textContent=best;
let p,obs,clouds,buildings,score,speed,over,frame,jumps,ducking;
function reset(){
  p={x:80,y:GROUND,vy:0};
  obs=[];
  clouds=[{x:100,y:40},{x:350,y:60},{x:600,y:30}];
  buildings=[];for(let i=0;i<6;i++)buildings.push({x:i*130,h:60+Math.random()*70});
  score=0;speed=5;over=false;frame=0;jumps=0;ducking=false;
}
reset();
function jump(){if(p.y>=GROUND){p.vy=-12;jumps=1;}else if(jumps===1){p.vy=-10;jumps=2;}}
document.addEventListener("keydown",e=>{
  if(e.key===" "||e.key==="ArrowUp"){e.preventDefault();if(over)reset();else jump();}
  if(e.key==="ArrowDown"){e.preventDefault();ducking=true;}
});
document.addEventListener("keyup",e=>{if(e.key==="ArrowDown")ducking=false;});
const TYPES=["trash","cone","banana","hydrant","bird"];
function spawnObs(){
  const t=TYPES[Math.floor(Math.random()*TYPES.length)];
  let o={x:W+20,type:t};
  if(t==="trash"){o.w=22;o.h=32;o.y=GROUND+8-o.h;}
  else if(t==="cone"){o.w=22;o.h=26;o.y=GROUND+8-o.h;}
  else if(t==="banana"){o.w=24;o.h=10;o.y=GROUND+8-o.h;}
  else if(t==="hydrant"){o.w=20;o.h=28;o.y=GROUND+8-o.h;}
  else{o.w=28;o.h=18;o.y=GROUND-55;}
  obs.push(o);
}
let obsTimer=0;
function drawAthlete(){
  const px=p.x,py=p.y;
  const running=p.y>=GROUND&&!ducking;
  const legFrame=Math.floor(frame/6)%2;
  if(ducking&&p.y>=GROUND){
    // ducking pose
    x.fillStyle="#2d2d2d";x.fillRect(px+4,py+10,18,3);    // hair
    x.fillStyle="#ffd7b5";x.fillRect(px+4,py+13,16,8);    // head
    x.fillStyle="#000";x.fillRect(px+17,py+15,2,2);       // eye
    x.fillStyle="#f5576c";x.fillRect(px+2,py+21,22,12);   // body
    x.fillStyle="#fff";x.fillRect(px+8,py+24,10,2);       // shirt stripe
    x.fillStyle="#4a4a4a";x.fillRect(px,py+33,10,5);x.fillRect(px+14,py+33,10,5); // shoes
  } else {
    // Standing/running - clean sprite, fixed body parts
    // Head
    x.fillStyle="#2d2d2d";x.fillRect(px+8,py-2,12,3);     // hair
    x.fillStyle="#ffd7b5";x.fillRect(px+8,py+1,12,9);     // face
    x.fillStyle="#000";x.fillRect(px+16,py+5,2,2);        // eye
    // Body
    x.fillStyle="#f5576c";x.fillRect(px+6,py+10,16,14);   // shirt
    x.fillStyle="#fff";x.fillRect(px+10,py+14,8,3);       // shirt logo
    // Arms (fixed positions, swing slightly while running)
    const armSwing=running?(legFrame===0?2:-2):0;
    x.fillStyle="#ffd7b5";
    x.fillRect(px+2,py+11+armSwing,5,9);                  // left arm
    x.fillRect(px+22,py+11-armSwing,5,9);                 // right arm
    // Pants
    x.fillStyle="#4facfe";x.fillRect(px+7,py+24,7,8);     // left leg pant
    x.fillRect(px+15,py+24,7,8);                          // right leg pant
    // Legs/shoes - alternate when running
    x.fillStyle="#000";
    if(running){
      if(legFrame===0){
        x.fillRect(px+5,py+32,10,4);                      // left shoe forward
        x.fillRect(px+15,py+32,9,4);                      // right shoe back
      } else {
        x.fillRect(px+7,py+32,9,4);
        x.fillRect(px+17,py+32,10,4);
      }
    } else {
      x.fillRect(px+6,py+32,9,4);
      x.fillRect(px+16,py+32,9,4);
    }
  }
}
function drawObs(o){
  if(o.type==="trash"){
    x.fillStyle="#4a4a4a";x.fillRect(o.x,o.y+4,o.w,o.h-4);
    x.fillStyle="#2d2d2d";x.fillRect(o.x-2,o.y,o.w+4,5);
    x.fillStyle="#666";x.fillRect(o.x+4,o.y+8,2,o.h-12);x.fillRect(o.x+10,o.y+8,2,o.h-12);x.fillRect(o.x+16,o.y+8,2,o.h-12);
  } else if(o.type==="cone"){
    x.fillStyle="#ff6f00";
    x.beginPath();x.moveTo(o.x+o.w/2,o.y);x.lineTo(o.x,o.y+o.h);x.lineTo(o.x+o.w,o.y+o.h);x.closePath();x.fill();
    x.fillStyle="#fff";x.fillRect(o.x+3,o.y+o.h-12,o.w-6,3);
    x.fillStyle="#2d2d2d";x.fillRect(o.x-3,o.y+o.h,o.w+6,3);
  } else if(o.type==="banana"){
    x.fillStyle="#ffeb3b";
    x.beginPath();x.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0.3,0,Math.PI*2);x.fill();
    x.fillStyle="#8d6e63";x.fillRect(o.x+2,o.y+o.h/2-2,3,2);
  } else if(o.type==="hydrant"){
    x.fillStyle="#f5576c";x.fillRect(o.x+2,o.y+5,o.w-4,o.h-5);x.fillRect(o.x,o.y+10,o.w,4);
    x.fillStyle="#b71c1c";x.fillRect(o.x+o.w/2-3,o.y,6,7);
  } else if(o.type==="bird"){
    const bf=Math.floor(frame/8)%2;
    x.fillStyle="#3f51b5";x.fillRect(o.x+6,o.y+6,16,8);
    x.fillRect(o.x+20,o.y+4,6,6);
    x.fillStyle="#ff9100";x.fillRect(o.x+26,o.y+6,3,2);
    x.fillStyle="#000";x.fillRect(o.x+23,o.y+5,1,1);
    if(bf===0){x.fillStyle="#3f51b5";x.fillRect(o.x,o.y,10,5);x.fillRect(o.x+16,o.y,10,5);}
    else{x.fillStyle="#3f51b5";x.fillRect(o.x+2,o.y+10,8,5);x.fillRect(o.x+18,o.y+10,8,5);}
  }
}
function loop(){
  // Sky
  x.fillStyle="#87ceeb";x.fillRect(0,0,W,180);
  x.fillStyle="#f093fb";x.fillRect(0,120,W,60);
  // Buildings (background)
  buildings.forEach(b=>{
    x.fillStyle="#3a3a5a";x.fillRect(b.x,180-b.h,90,b.h);
    x.fillStyle="#ffeb3b";
    for(let wy=180-b.h+8;wy<175;wy+=12)
      for(let wx=b.x+4;wx<b.x+86;wx+=12){if((wx+wy)%5<3)x.fillRect(wx,wy,5,7);}
  });
  // Clouds
  clouds.forEach(cl=>{
    x.fillStyle="#fff";
    x.fillRect(cl.x,cl.y,40,8);
    x.fillRect(cl.x+5,cl.y-5,30,8);
    x.fillRect(cl.x+10,cl.y-9,20,8);
  });
  // Ground
  x.fillStyle="#3e2723";x.fillRect(0,GROUND+38,W,H-GROUND-38);
  x.fillStyle="#5d4037";
  for(let i=-((frame*speed)%30);i<W;i+=30)x.fillRect(i,GROUND+40,15,3);
  if(!over){
    p.vy+=0.6;p.y+=p.vy;
    if(p.y>GROUND){p.y=GROUND;p.vy=0;jumps=0;}
    obsTimer++;
    if(obsTimer>Math.max(35,75-score/100)){spawnObs();obsTimer=0;}
    obs.forEach(o=>o.x-=speed);
    obs=obs.filter(o=>o.x>-50);
    buildings.forEach(b=>{b.x-=speed*0.3;if(b.x<-90){b.x+=780;b.h=60+Math.random()*70;}});
    clouds.forEach(cl=>{cl.x-=speed*0.5;if(cl.x<-50)cl.x=W+50;});
    score++;speed=5+score/600;frame++;
    // Hitbox
    const ph={x:p.x+4,y:ducking?p.y+13:p.y,w:22,h:ducking?20:38};
    for(const o of obs){
      if(o.x<ph.x+ph.w&&o.x+o.w>ph.x&&o.y<ph.y+ph.h&&o.y+o.h>ph.y){
        over=true;
        if(score>best){best=score;localStorage.setItem("jumperBest",best);document.getElementById("best").textContent=best;}
      }
    }
  }
  obs.forEach(drawObs);
  drawAthlete();
  document.getElementById("score").textContent=score;
  if(over){
    x.fillStyle="rgba(0,0,0,0.7)";x.fillRect(0,0,W,H);
    x.fillStyle="#ffd93d";x.font="bold 28px sans-serif";x.textAlign="center";x.fillText("GAME OVER",W/2,H/2-15);
    x.fillStyle="#fff";x.font="16px sans-serif";x.fillText("SCORE: "+score,W/2,H/2+15);x.fillText("Press SPACE to retry",W/2,H/2+40);
  }
  requestAnimationFrame(loop);
}
loop();
</script></body></html>
