<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminal Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 {
    text-align: center;
    font-size: 3em;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; opacity: 0.7; margin-bottom: 50px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    text-decoration: none;
    color: #fff;
    transition: transform 0.2s, background 0.2s;
    backdrop-filter: blur(10px);
  }
  .card:hover {
    transform: translateY(-6px);
    background: rgba(255,255,255,0.15);
  }
  .emoji { font-size: 4em; display: block; margin-bottom: 15px; }
  .card h2 { margin-bottom: 10px; }
  .card p { opacity: 0.7; font-size: 0.95em; }
  footer { text-align: center; margin-top: 60px; opacity: 0.5; }
</style>
</head>
<body>
  <h1>Terminal Games</h1>
  <p class="subtitle">Pick a game. Play. Repeat.</p>
  <div class="grid">
    <a href="tetris.html" class="card">
      <span class="emoji">🧱</span>
      <h2>Tetris</h2>
      <p>Stack blocks. Clear lines. Classic.</p>
    </a>
    <a href="dodge.html" class="card">
      <span class="emoji">🚗</span>
      <h2>Dodge</h2>
      <p>Avoid obstacles. Don''t crash.</p>
    </a>
    <a href="jumper.html" class="card">
      <span class="emoji">🏃</span>
      <h2>Jumper</h2>
      <p>Endless runner. Time your jumps.</p>
    </a>
    <a href="snake.html" class="card">
      <span class="emoji">🐍</span>
      <h2>Snake</h2>
      <p>Eat. Grow. Don''t bite yourself.</p>
    </a>
    <a href="memory.html" class="card">
      <span class="emoji">🧠</span>
      <h2>Memory Match</h2>
      <p>Find the pairs. Beat your time.</p>
    </a>
  </div>
  <footer>Built by Sahid · 2026</footer>
</body>
</html>
